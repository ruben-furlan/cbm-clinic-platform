<section class="admin-login-page">
  <div class="admin-login-card">
    <p class="brand">CBM Fisioterapia</p>
    <h1>Acceso admin</h1>

    <form (ngSubmit)="login()" #loginForm="ngForm" novalidate>
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        name="email"
        [(ngModel)]="email"
        required
        email
        [disabled]="isLoading"
        placeholder="admin@cbm.com"
        autocomplete="email"
      />

      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="password"
        required
        minlength="6"
        [disabled]="isLoading"
        placeholder="••••••••"
        autocomplete="current-password"
      />

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isLoading || loginForm.invalid">
        {{ isLoading ? 'Entrando...' : 'Entrar al panel' }}
      </button>
    </form>
  </div>
</section>
