<div class="physio-background" aria-hidden="true" [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute ? 'none' : null">
  <div class="physio-aurora physio-aurora-1"></div>
  <div class="physio-aurora physio-aurora-2"></div>
  <div class="physio-wave"></div>
  <div class="physio-wave physio-wave-secondary"></div>
  <div class="physio-orbit physio-orbit-1"></div>
  <div class="physio-orbit physio-orbit-2"></div>
  <div class="physio-dot physio-dot-1"></div>
  <div class="physio-dot physio-dot-2"></div>
  <div class="physio-ribbon"></div>
</div>

<div class="app-content" [class.app-content--display]="isDisplayRoute">
  <app-header [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute ? 'none' : null"></app-header>
  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
  <app-floating-whatsapp-button [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute ? 'none' : null"></app-floating-whatsapp-button>
  <app-floating-booking-button [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute || isSolicitudCitaRoute ? 'none' : null"></app-floating-booking-button>
  <app-cookie-consent [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute ? 'none' : null"></app-cookie-consent>
  <app-footer [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute ? 'none' : null"></app-footer>
</div>

<button
  class="back-to-top"
  [class.back-to-top--visible]="showScrollTop"
  [style.display]="isDisplayRoute || isCanjearRoute || isBajaNewsletterRoute || isAdminRoute || isComunidadRoute ? 'none' : null"
  (click)="scrollToTop()"
  aria-label="Volver al inicio"
>
  <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
    <path fill="currentColor" d="M12 4l-8 8h5v8h6v-8h5z"/>
  </svg>
</button>
