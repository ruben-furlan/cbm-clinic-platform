<section class="cookie-consent" *ngIf="isVisible" aria-label="Aviso de cookies">
  <p>
    Usamos cookies para mejorar tu experiencia, analizar el uso del sitio y optimizar nuestros servicios.
    <a routerLink="/" fragment="cookies">Ver más</a>
  </p>

  <button type="button" class="btn-primary" (click)="acceptCookies()">
    Aceptar cookies
  </button>
</section>
