<header class="header">
  <div class="container nav">
    <a class="logo" routerLink="/" (click)="closeMobileMenu()">
      <img src="/logo-header.png" alt="CBM Fisioterapia">
    </a>

    <nav class="nav-links">
      <a routerLink="/" fragment="experiencia">Experiencia</a>

      <div class="nav-item-with-submenu">
        <a routerLink="/" fragment="servicios">Tratamientos</a>
        <div class="submenu">
          <a routerLink="/" fragment="servicios">Resumen</a>
          <a routerLink="/tratamientos/fisioterapia">Ver todo</a>
        </div>
      </div>

      <a routerLink="/" fragment="reserva">Solicitar cita</a>
      <a routerLink="/" fragment="faq">FAQ</a>
      <a routerLink="/" fragment="contacto">Contáctanos</a>
      <a routerLink="/blog">Blog</a>
    </nav>

    <a class="btn-primary btn-booking header-cta" routerLink="/" fragment="reserva">
      <span class="btn-icon" aria-hidden="true">💬</span>
      <span>Solicitar cita</span>
    </a>

    <div class="language-selector" aria-label="Selector de idioma">
      <label class="sr-only" for="language-select">Seleccionar idioma</label>
      <span class="language-icon" aria-hidden="true">🌐</span>
      <select id="language-select" [value]="selectedLanguage" (change)="onLanguageChange($event)">
        @for (language of languages; track language.code) {
          <option [value]="language.code">{{ language.label }}</option>
        }
      </select>
    </div>

    <button
      type="button"
      class="mobile-menu-toggle"
      [attr.aria-expanded]="isMobileMenuOpen"
      aria-label="Abrir menú"
      (click)="toggleMobileMenu()"
    >
      ☰
    </button>
  </div>

  <div class="mobile-menu" [ngClass]="{ 'is-open': isMobileMenuOpen }">
    <div class="container mobile-menu-links">
      <a routerLink="/" fragment="experiencia" (click)="closeMobileMenu()">Experiencia</a>
      <a routerLink="/" fragment="servicios" (click)="closeMobileMenu()">Tratamientos</a>
      <a routerLink="/tratamientos/fisioterapia" (click)="closeMobileMenu()">Ver todo</a>
      <a routerLink="/" fragment="reserva" (click)="closeMobileMenu()">Solicitar cita</a>
      <a routerLink="/" fragment="faq" (click)="closeMobileMenu()">FAQ</a>
      <a routerLink="/" fragment="contacto" (click)="closeMobileMenu()">Contáctanos</a>
      <a routerLink="/blog" (click)="closeMobileMenu()">Blog</a>

      <div class="language-selector-mobile" aria-label="Selector de idioma móvil">
        <span class="language-icon" aria-hidden="true">🌐</span>
        <div class="language-pills" role="group" aria-label="Seleccionar idioma">
          @for (language of languages; track language.code) {
            <button
              type="button"
              class="language-pill"
              [class.is-active]="selectedLanguage === language.code"
              (click)="changeLanguage(language.code)"
            >
              {{ language.label }}
            </button>
          }
        </div>
      </div>
    </div>
  </div>
</header>

<div id="google_translate_element" class="google-translate-container" aria-hidden="true"></div>
