<section class="home-carousel section section-flow" aria-label="Carrusel destacado de tratamientos">
  <div class="container">
    <div
      class="carousel-card"
      (mouseenter)="pauseAutoplay()"
      (mouseleave)="resumeAutoplay()"
      (touchstart)="onTouchStart($event)"
      (touchend)="onTouchEnd($event)"
    >
      <div
        class="carousel-track"
        [style.transform]="'translateX(-' + currentIndex * 100 + '%)'"
      >
        <article class="carousel-slide" *ngFor="let slide of slides; trackBy: trackByIndex">
          <img
            [src]="slide.image"
            [alt]="slide.imageAlt"
            loading="lazy"
            decoding="async"
          />

          <div class="slide-overlay"></div>

          <div class="slide-content">
            <h2>{{ slide.title }}</h2>
            <p>{{ slide.description }}</p>
            <a class="btn-primary btn-booking" [href]="slide.ctaHref">{{ slide.ctaLabel }}</a>
          </div>
        </article>
      </div>

      <button
        type="button"
        class="carousel-arrow carousel-arrow-prev"
        (click)="prevSlide(); restartAutoplay()"
        aria-label="Slide anterior"
      >
        ‹
      </button>
      <button
        type="button"
        class="carousel-arrow carousel-arrow-next"
        (click)="nextSlide(); restartAutoplay()"
        aria-label="Siguiente slide"
      >
        ›
      </button>

      <div class="carousel-dots" aria-label="Indicadores del carrusel">
        <button
          type="button"
          class="carousel-dot"
          *ngFor="let _ of slides; let i = index; trackBy: trackByIndex"
          [class.is-active]="currentIndex === i"
          (click)="goToSlide(i)"
          [attr.aria-label]="'Ir al slide ' + (i + 1)"
        ></button>
      </div>
    </div>
  </div>
</section>
