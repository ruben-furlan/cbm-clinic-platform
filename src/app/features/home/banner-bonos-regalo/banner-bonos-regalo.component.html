<ng-container *ngIf="isActivo">
  <section class="bonos-banner section section-flow" appRevealOnScroll>
    <div class="container">
      <article class="bonos-banner-card glass-panel floating-card">
        <div class="bonos-banner-left">
          <div class="bonos-gift">🎁</div>
          <h2>¿Quieres regalar bienestar?</h2>
          <p class="bonos-subtitle">Dale a alguien especial la experiencia de sentirse mejor 💜</p>
          <p class="bonos-note">Fisioterapia, pilates y más — el regalo que de verdad se nota en el cuerpo</p>
        </div>
        <div class="bonos-banner-right">
          <a class="btn-primary" routerLink="/regalo">Ver bonos regalo →</a>
          <p>Elige el servicio, personaliza el mensaje y nosotros nos encargamos del resto</p>
        </div>
      </article>
    </div>
  </section>
</ng-container>
