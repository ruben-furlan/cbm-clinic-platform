<section id="faq" class="faq section">
  <div class="container">
    <cbm-loader *ngIf="loading"></cbm-loader>

    <div class="faq-card cbm-content-loaded" *ngIf="!loading" appRevealOnScroll>
      <h2>Preguntas frecuentes:</h2>

      <div class="faq-grid">
        <article class="faq-item" *ngFor="let item of faqItems; let i = index">
          <button
            type="button"
            class="faq-question"
            [attr.aria-expanded]="activeItemIndex === i"
            (click)="toggleItem(i)"
          >
            {{ item.pregunta }}
            <span class="faq-icon">{{ activeItemIndex === i ? '−' : '+' }}</span>
          </button>

          <p class="faq-answer" *ngIf="activeItemIndex === i">
            {{ item.respuesta }}
          </p>
        </article>
      </div>
    </div>
  </div>
</section>
