<div class="pass-wrap">

  <!-- ── Tarjeta pase ──────────────────────────────────────────────────────── -->
  <article class="pass-card" [class.pass-card--pending]="isPending" aria-label="Tu pase digital">

    <!-- Decoración de fondo -->
    <div class="pass-bg-orb pass-bg-orb--a" aria-hidden="true"></div>
    <div class="pass-bg-orb pass-bg-orb--b" aria-hidden="true"></div>

    <!-- ── Cabecera: marca + estado ─────────────────────────────────────────── -->
    <div class="pass-header">
      <div class="pass-brand">
        <img
          src="/favicon-192x192.png"
          alt="CBM Fisioterapia"
          class="pass-logo"
          width="28"
          height="28"
        />
        <span class="pass-brand-name">CBM Fisioterapia</span>
      </div>

      <div class="pass-status-row">
        <div class="pass-status-icon" [class.pass-status-icon--pending]="isPending">
          <span *ngIf="!isPending">✓</span>
          <span *ngIf="isPending">·</span>
        </div>
        <div>
          <p class="pass-status-title">{{ passTitle }}</p>
          <p class="pass-status-sub">{{ passSubtitle }}</p>
        </div>
      </div>
    </div>

    <!-- ── Info del evento ───────────────────────────────────────────────────── -->
    <div class="pass-event-block">
      <p class="pass-event-name">{{ event.title }}</p>

      <div class="pass-event-meta">
        <span class="pass-meta-item">
          <span aria-hidden="true">📅</span>
          <span class="pass-meta-cap">{{ formattedDate }}</span>
        </span>
        <span class="pass-meta-sep" aria-hidden="true">·</span>
        <span class="pass-meta-item">
          <span aria-hidden="true">🕙</span>
          <span>{{ formattedTime }}</span>
        </span>
      </div>

      <div class="pass-event-meta" *ngIf="event.location">
        <span class="pass-meta-item">
          <span aria-hidden="true">📍</span>
          <span>{{ event.location }}</span>
        </span>
      </div>

      <p class="pass-attendee">{{ registration.full_name }}</p>
    </div>

    <!-- ── Separador estilo "tear" ──────────────────────────────────────────── -->
    <div class="pass-tear" aria-hidden="true">
      <div class="pass-tear-notch pass-tear-notch--left"></div>
      <div class="pass-tear-line"></div>
      <div class="pass-tear-notch pass-tear-notch--right"></div>
    </div>

    <!-- ── Código de acceso ──────────────────────────────────────────────────── -->
    <div class="pass-code-section">
      <p class="pass-code-label">Código de acceso</p>

      <div class="pass-code-row">
        <span class="pass-code" aria-label="Tu código de acceso">
          {{ registration.access_code ?? '···' }}
        </span>
        <button
          type="button"
          class="pass-copy-btn"
          (click)="copyCode()"
          [attr.aria-label]="copied ? 'Copiado' : 'Copiar código'"
          [class.pass-copy-btn--done]="copied"
        >
          <span *ngIf="!copied">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </span>
          <span *ngIf="copied">✓</span>
        </button>
      </div>

      <p class="pass-code-hint">{{ codeHint }}</p>

      <!-- Feedback de copia -->
      <p class="pass-copied-msg" *ngIf="copied" role="status">
        Código copiado al portapapeles
      </p>
    </div>

  </article>

  <!-- ── CTAs debajo del pase ──────────────────────────────────────────────── -->
  <div class="pass-actions">
    <button type="button" class="pass-cta pass-cta--wa" (click)="shareWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.555 4.122 1.527 5.855L0 24l6.318-1.508A11.956 11.956 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818c-1.943 0-3.758-.524-5.308-1.434l-.38-.226-3.752.895.942-3.654-.247-.393A9.794 9.794 0 0 1 2.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/>
      </svg>
      Confirmar por WhatsApp
    </button>
  </div>

</div>
