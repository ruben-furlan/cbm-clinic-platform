<div class="nl-wrap" [class.nl-wrap--oscuro]="variante === 'oscuro'">

  <!-- Estado inicial / cargando -->
  <ng-container *ngIf="estado !== 'exito' && estado !== 'yaExiste'">
    <h3 class="nl-titulo">{{ titulo }}</h3>
    <p class="nl-subtitulo">{{ subtitulo }}</p>

    <form class="nl-form" (ngSubmit)="suscribir()" *ngIf="estado !== 'error'">
      <div class="nl-input-row">
        <input
          class="nl-input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          required
          [disabled]="estado === 'cargando'"
          autocomplete="email"
          [style.border-color]="errorValidacion ? '#ef4444' : ''"
          (input)="errorValidacion = ''"
        />
        <button
          class="nl-btn"
          type="submit"
          [disabled]="estado === 'cargando' || !email.trim()"
        >
          <span *ngIf="estado !== 'cargando'">Suscribirme 💜</span>
          <span *ngIf="estado === 'cargando'" class="nl-spinner" aria-label="Enviando..."></span>
        </button>
      </div>
      <p *ngIf="errorValidacion" class="nl-validation-error">{{ errorValidacion }}</p>
    </form>

    <div *ngIf="estado === 'error'" class="nl-error-block">
      <p class="nl-error-msg">Algo salió mal. Inténtalo de nuevo.</p>
      <button type="button" class="nl-btn-retry" (click)="reintentar()">Volver a intentarlo</button>
    </div>
  </ng-container>

  <!-- Estado éxito -->
  <div class="nl-exito" *ngIf="estado === 'exito'" role="status">
    <span class="nl-exito-icono" aria-hidden="true">💜</span>
    <p class="nl-exito-texto">
      ¡Ya eres parte de la comunidad CBM!<br>
      Serás de las primeras en enterarte 💜
    </p>
  </div>

  <!-- Estado ya existe -->
  <div class="nl-exito" *ngIf="estado === 'yaExiste'" role="status">
    <span class="nl-exito-icono" aria-hidden="true">💜</span>
    <p class="nl-exito-texto">
      ¡Ya eres parte de nosotros! 💜<br>
      Tu email ya está registrado en la comunidad CBM. ¡Gracias por estar aquí!
    </p>
  </div>

</div>
