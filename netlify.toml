[functions]
  directory = "netlify/functions"

[build]
command = """
  sed -i "s|__SUPABASE_URL__|$SUPABASE_URL|g" src/environments/environment.prod.ts &&
  sed -i "s|__SUPABASE_ANON_KEY__|$SUPABASE_ANON_KEY|g" src/environments/environment.prod.ts &&
  npm run build
  """
publish = "dist/cbm-clinic-platform/browser"
